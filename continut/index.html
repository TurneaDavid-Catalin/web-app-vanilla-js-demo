<!DOCTYPE html>
<html lang="ro">

<head>
    <title> Proiect 1 - Acasă</title>
    <link type="text/css" rel="stylesheet" href="css/stil.css">
    <script>
        function schimbaContinut(resursa, jsFisier, jsFunctie) {
            var xhttp = new XMLHttpRequest();
            xhttp.onreadystatechange = function () {
                if (this.readyState == 4 && this.status == 200) {
                    document.getElementById("continut").innerHTML =
                        this.responseText;
                    if (jsFisier) {
                        var elementScript = document.createElement('script');
                        elementScript.onload = function () {
                            console.log("hello");
                            if (jsFunctie) {
                                window[jsFunctie]();
                            }
                        };
                        elementScript.src = jsFisier;
                        document.head.appendChild(elementScript);
                    } else {
                        if (jsFunctie) {
                            window[jsFunctie]();
                        }
                    }
                    console.log("ceva");
                }
            };
            console.log("altceva");
            xhttp.open("GET", resursa + '.html', true);
            xhttp.send();
        }
    </script>
    <script src="js/script.js"></script>
    <script src="js/cumparaturi.js"></script>
</head>

<body onload="schimbaContinut('acasa')">
    <nav class="navContainer">
        <img src="imagini/The-Four-Kings.png" alt="The four kings logo" class="navLogo">

        <div class="navLinks">
            <a class="navItem" onclick="schimbaContinut('acasa')">Acasă</a>
            <a class="navItem" onclick="schimbaContinut('video')">Video</a>
            <a class="navItem" onclick="schimbaContinut('inregistreaza')" style="padding-top: 2px;">Înregistrează</a>
            <a class="navItem" onclick="schimbaContinut('despre')">Despre</a>
            <a class="navItem" onclick="schimbaContinut('desen')">Desen</a>
            <a class="navItem" onclick="schimbaContinut('invat')">Învăț</a>
            <a class="navItem" onclick="schimbaContinut('persoane', 'js/persoane.js', 'incarcaPersoane')">Persoane</a>
            <a class="navItem" onclick="schimbaContinut('verifica')">Verifică</a>
            <a class="navItem" onclick="schimbaContinut('cumparaturi', 'js/cumparaturi.js', 'initCumparaturi')">Cumpărături</a>
        </div>
    </nav>

    <div class="logo"></div>

    <main id="continut">
    </main>

    <center>
        <footer>
            <p>&copy; 2026 Turnea David-Cătălin - Programare Web</p>
        </footer>
    </center>
</body>

</html>
