<center>
    <div style="margin-bottom: 12px;">
        <label for="storage-mode">Metodă de salvare:</label>
        <select id="storage-mode" onchange="setStorageMode(this.value)">
            <option value="localStorage">localStorage</option>
            <option value="indexedDB">IndexedDB</option>
        </select>
    </div>

    <label for="produse">Alegeți produsul:</label>
    <select name="produse" id="produse">
        <option value="Mănuși de box">Mănuși de box</option>
        <option value="Sac de box">Sac de box</option>
        <option value="Proteză">Proteză</option>
        <option value="Bandaje">Bandaje</option>
        <option value="Cască">Cască</option>
    </select>

    <label for="cantitate">Alegeți cantitatea:</label>
    <input type="number" name="cantitate" id="cantitate" min="1" max="99">
    
    <input type="button" name="adauga" id="adauga" value="Adaugă" onclick="addProduct()">

    <hr> <h3>Lista de Cumpărături</h3>
    <table id="tabel-produse">
        <thead>
            <tr>
                <th>ID</th>
                <th>Nume Produs</th>
                <th>Cantitate</th>
            </tr>
        </thead>
        <tbody id="corp-tabel">
            </tbody>
    </table>
</center>
